# CI du dépôt MLOps (une fois extrait vers ifar-mlops).
# Léger : lint + tests du cœur (métriques/export), sans dépendances GPU.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Installer (cœur + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Tests
        run: pytest -q
